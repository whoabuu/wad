<!DOCTYPE html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-2 bg-dark text-white p-3 vh-100">
          <h3>Admin</h3>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a href="#" class="nav-link text-white">Home</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link text-white">Users</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link text-white">Products</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link text-white">Orders</a>
            </li>
          </ul>
        </div>

        <div class="col-10 p-4">
          <h1>Dashboard</h1>
          <div class="row mt-4">
            <div class="col-md-4">
              <div class="card bg-success text-white">
                <div class="card-body">
                  <h5>Total Users</h5>
                  <p>1,000</p>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card bg-danger text-white">
                <div class="card-body">
                  <h5>Total Sales</h5>
                  <p>$10,000</p>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card bg-warning text-white">
                <div class="card-body">
                  <h5>Total Orders</h5>
                  <p>100</p>
                </div>
              </div>
            </div>
          </div>

          <h3 class="mt-5">Recent orders</h3>
          <table class="table table-bordered mt-3">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>John Doe</td>
                <td>$100</td>
                <td>Completed</td>
              </tr>
              <tr>
                <td>2</td>
                <td>Jane Smith</td>
                <td>$50</td>
                <td>Pending</td>
              </tr>
              <tr>
                <td>3</td>
                <td>Bob Johnson</td>
                <td>$75</td>
                <td>Cancelled</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
